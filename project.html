  <!-- Pokémon PC Room -->

    <div class="monitor">
      <div class="pc-screen">
  <!-- LEFT: Project Card -->

      </span class="project-card__id">#001</span>

    <div class="project-card__sprite image-pixelated">

        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div>
      </div>
    </div>

    <div class="pc-actions">
      <a class="pc-btn" href="#">PARTY Pᵏᴹᴺ</a>

</div>
